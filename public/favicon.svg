<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0a0a0a"/>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1a0000"/>
      <stop offset="20%"  stop-color="#7f1d1d"/>
      <stop offset="42%"  stop-color="#dc2626"/>
      <stop offset="50%"  stop-color="#f97316"/>
      <stop offset="58%"  stop-color="#dc2626"/>
      <stop offset="80%"  stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </linearGradient>
  </defs>
  <ellipse cx="32" cy="32" rx="26" ry="5" fill="#b91c1c" opacity="0.18" filter="url(#glow)"/>
  <rect x="7" y="27" width="50" height="10" rx="5" fill="#0f0000"/>
  <rect x="9"  y="28.5" width="46" height="7" rx="3.5" fill="url(#scan)" filter="url(#glow)"/>
  <rect x="22" y="30"   width="20" height="4" rx="2"   fill="#f97316" opacity="0.85"/>
  <rect x="27" y="30.5" width="10" height="3" rx="1.5" fill="#fed7aa" opacity="0.9"/>
  <ellipse cx="32" cy="32" rx="4" ry="1.5" fill="#fff7ed" opacity="0.7"/>
</svg>
