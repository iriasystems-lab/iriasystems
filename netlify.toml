[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# API proxies — must come before the SPA catch-all
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/weather"
  to = "/.netlify/functions/weather"
  status = 200

[[redirects]]
  from = "/api/stations"
  to = "/.netlify/functions/stations"
  status = 200

[[redirects]]
  from = "/api/route"
  to = "/.netlify/functions/route"
  status = 200

[[redirects]]
  from = "/api/maps"
  to = "/.netlify/functions/maps"
  status = 200

[[redirects]]
  from = "/api/worldtime"
  to = "/.netlify/functions/worldtime"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
